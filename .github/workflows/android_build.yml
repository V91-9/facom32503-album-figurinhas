name: Android CI Build

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permissão de execução ao Gradle
        run: chmod +x mobile-app/gradlew

      - name: Build do Projeto com Gradle
        run: cd mobile-app && ./gradlew assembleDebug
        
      - name: Upload do APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile-app/app/build/outputs/apk/debug/*.apk

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permissão de execução ao Gradle
        run: chmod +x mobile-app/gradlew

      - name: Executar Lint
        run: cd mobile-app && ./gradlew lintDebug

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permissão de execução ao Gradle
        run: chmod +x mobile-app/gradlew

      - name: Executar Testes Unitários
        run: cd mobile-app && ./gradlew testDebugUnitTest